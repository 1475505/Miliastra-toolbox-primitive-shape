app = "miliastra-toolbox-primitive-shape"
primary_region = "hkg"

[build]

[env]
  PORT = "5555"

[http_service]
  internal_port = 5555
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048
